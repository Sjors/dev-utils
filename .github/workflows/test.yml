name: Tests

on:
  push:
  pull_request:

jobs:
  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats-core
        run: |
          git clone --depth 1 --branch v1.13.0 \
            https://github.com/bats-core/bats-core.git /tmp/bats-core
          echo "/tmp/bats-core/bin" >> "$GITHUB_PATH"
      - name: Run tests
        run: bats tests/
